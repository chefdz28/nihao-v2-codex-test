<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- V3.4.1: GA4 tag in <head> so Google's installer can detect it. The
         Measurement ID comes from the Vite env var (replaced at build time).
         send_page_view:false → the static tag sends NO automatic page views;
         the SPA route page_view tracking stays in src/lib/analytics.ts /
         AnalyticsTracker.tsx. No GTM, no duplicate tracking. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      (function () {
        var id = '%VITE_GA_MEASUREMENT_ID%';
        // skip config if the env var wasn't replaced at build time
        if (!id || id.indexOf('VITE_') !== -1) return;
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { dataLayer.push(arguments); };
        gtag('js', new Date());
        gtag('config', id, { send_page_view: false, anonymize_ip: true });
      })();
    </script>
    <title>NiHao - Learn Chinese for Beginners | تعلم الصينية للمبتدئين</title>
    <meta name="description" content="Learn Chinese with NiHao - Interactive lessons with audio, Pinyin, Arabic & English translations for beginners. تعلم الصينية مع نهاو - دروس تفاعلية مع الصوت والبينيين والترجمات العربية والإنجليزية" />
    <meta property="og:title" content="NiHao - Learn Chinese the Easy Way" />
    <meta property="og:description" content="Interactive Chinese lessons with audio, Pinyin, Arabic & English translations. Designed for beginners." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- V2.9A: reduced weights + non-render-blocking load (print→all swap) so
         fonts don't block first paint. Noto Serif SC (CJK) is heavy, so it's
         trimmed to the weights actually used. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;600;700&family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;600;700&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet" />
    </noscript>
      <meta property="og:url" content="https://cnihao.com/" />
    <meta property="og:image" content="https://cnihao.com/images/og-cover.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://cnihao.com/" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#FF3333" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
